<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Canopix - Website</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@200;400;600;700&display=swap" rel="stylesheet">
<style>
/* ===== ROOT COLORS ===== */

:root{
--primary: rgba(147,93,31,0.78);
--secondary:#e09524;
--dark-bg:#0b0c10;
--light-bg:#111217;
--text-light:#c5c6c7;
--white:#ffffff;
--gold:#c5b86b;
--separator:#2b1d0e;
}

/* ===== GLOBAL ===== */

body{
margin:0;
font-family:'Poppins',sans-serif;
background:var(--dark-bg);
color:var(--text-light);
padding-top:80px;
overflow-x:hidden;
}

/* ===== NAVBAR ===== */

.navbar{

position:fixed;
top:0;
left:0;
width:100%;

display:flex;
align-items:center;
justify-content:space-between;

padding:14px 50px;

background:rgba(61,43,31,0.95);
border-bottom:2px solid var(--primary);

backdrop-filter:blur(10px);

z-index:1000;

}

/* LEFT SIDE */

.nav-left{
display:flex;
align-items:center;
gap:12px;
}

.logo{
width:36px;
height:36px;
border-radius:6px;
background:white;
padding:3px;
}

.brand{
font-size:22px;
font-weight:700;
color:var(--secondary);
letter-spacing:1px;
}

/* RIGHT SIDE */

.nav-right{
display:flex;
align-items:center;
gap:35px;
}

/* LINKS */

.nav-links{
display:flex;
align-items:center;
gap:28px;
list-style:none;
margin:0;
padding:0;
}

.nav-links a{
text-decoration:none;
color:var(--white);
font-size:14px;
transition:.3s;
}

.nav-links a:hover{
color:var(--secondary);
}

.nav-links a.active{
color:var(--gold);
font-weight:600;
}

/* BACK BUTTON */

.back-home{
/* background:var(--primary); */
/* padding:6px 14px; */
/* border-radius:6px; */
/* font-size:13px; */

    padding: 0.8rem 1.5rem;
    background: var(--primary);
    color: var(--dark-bg);
    font-weight: bold;
    border-radius: 5px;
    cursor: pointer;
    border: none;
    display: inline-block;
    text-decoration: none;
    transition: 0.3s;

}

.back-home:hover{
background:var(--secondary);
color:white;
transform: translateY(-3px);
}

/* PROFILE */

.profile-nav{
display:flex;
align-items:center;
gap:8px;
cursor:pointer;
color:var(--gold);
font-weight:600;
transition:.3s;
}

.profile-nav:hover{
color:white;
}

.profile-img-nav{
width:32px;
height:32px;
border-radius:50%;
object-fit:cover;
border:1.5px solid var(--gold);
background:#23242a;
}

/* ===== HEADER ===== */

header{
text-align:center;
padding:60px 20px 30px;
}

header h1{
font-size:2.7rem;
color:white;
margin-bottom:10px;
}

header h1 span{
color:var(--gold);
}

header p{
max-width:650px;
margin:auto;
font-weight:300;
color:#aaa;
}

/* ===== STATS ===== */

.stats{

display:flex;
justify-content:center;
gap:50px;

background:var(--light-bg);

border-top:3px solid var(--separator);
border-bottom:3px solid var(--separator);

padding:18px 0;
margin-top:20px;

}

.stats div{
text-align:center;
font-size:14px;
}

.stats span{
display:block;
font-weight:700;
font-size:22px;
color:var(--gold);
}

/* ===== FILTERS ===== */

.filters{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:12px;
margin:40px 0;
}

.filters button{

background:#1a1a1a;
border:1px solid #333;
color:#f0f0f0;

padding:8px 16px;
border-radius:6px;

cursor:pointer;
transition:.3s;
font-size:13px;

}

.filters button:hover,
.filters button.active{

background:var(--primary);
color:white;
border-color:var(--primary);

}

/* ===== GALLERY ===== */

.gallery{

display:grid;

grid-template-columns:repeat(auto-fill,minmax(250px,1fr));

gap:22px;

padding:0 60px 60px;

}

/* ===== CARD ===== */

.card{

background:#1c1c1c;

border-radius:12px;

border:1px solid #333;

overflow:hidden;

transition:.35s;

}

.card:hover{

transform:translateY(-8px);

border-color:var(--primary);

box-shadow:0 10px 25px rgba(0,0,0,0.5);

}

.card img{

width:100%;
height:200px;
object-fit:cover;

}

/* CARD CONTENT */

.card-content{
padding:16px;
}

.card-content h3{
margin:0 0 6px 0;
font-size:16px;
color:white;
}

.card-content p{
font-size:13px;
margin:3px 0;
color:#bbb;
}

.card-content .source{
font-size:12px;
color:#888;
margin-top:5px;
}

/* ===== RESPONSIVE ===== */

@media(max-width:900px){

.nav-right{
gap:20px;
}

.nav-links{
gap:18px;
}

.gallery{
padding:0 25px 50px;
}

.stats{
gap:25px;
}

}
</style>
</head>

<body>
<!-- <nav>
            <ul>
                <li><a href="index.html#project">Innovation</a></li>
                <li><a href="index.html#values">Values</a></li>
                <li><a href="library.html" class="active">Library</a></li>
                <li><a href="index.html#robot">Robot</a></li>
                <li><a href="index.html#team">Crew</a></li>
            </ul>
        </nav> -->
    <nav class="navbar">

<div class="nav-left">
<img src="photo.jpg" class="logo">
<div class="brand">CANOPIX</div>
</div>

<div class="nav-right">

<ul class="nav-links">

<li><a href="index.html" class="back-home">Back Home</a></li>

<li><a href="#">Innovation</a></li>
<li><a href="#">Values</a></li>
<li><a href="#">Robot</a></li>
<li><a href="#">Crew</a></li>
<li><a href="#" class="active">Library</a></li>

</ul>

<div class="profile-nav">

<img src="default-avatar.png" class="profile-img-nav">

<span id="navUserName">Sara</span>

</div>

</div>

</nav>
<header>
    <h1>World <span>Manuscript</span> Library</h1>
    <p>A curated collection of the world's most significant manuscripts spanning civilizations, centuries, and continents.</p>
</header>

<div class="stats">
    <div><span id="manuscripts-count">0</span> Manuscripts</div>
    <div><span id="civilizations-count">0</span> Civilizations</div>
    <div><span id="languages-count">0</span> Languages</div>
    <!-- <div><span id="years-count">0</span> Years of History</div> -->
</div>

<div class="filters">
    <button class="active" data-filter="all">ALL</button>
    <button data-filter="Islamic">ISLAMIC</button>
    <button data-filter="Egyptian">EGYPTIAN</button>
    <button data-filter="European">EUROPEAN</button>
    <button data-filter="Asian">ASIAN</button>
    <button data-filter="African">AFRICAN</button>
</div>

<div class="gallery" id="gallery"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBhTJ88rN4Lj4fGogNCjUbJQke-7QiRbeo",
    authDomain: "canopix2026-83ceb.firebaseapp.com",
    projectId: "canopix2026-83ceb",
    storageBucket: "canopix2026-83ceb.firebasestorage.app",
    messagingSenderId: "646414631175",
    appId: "1:646414631175:web:af5a68adba29bbf4d085a2",
    measurementId: "G-66W234047H"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let manuscriptsData = [];

async function fetchManuscripts() {
    const querySnapshot = await getDocs(collection(db, "manuscripts"));
    manuscriptsData = querySnapshot.docs.map(doc => doc.data());

    // Update stats
    document.getElementById('manuscripts-count').textContent = manuscriptsData.length;
    document.getElementById('civilizations-count').textContent = [...new Set(manuscriptsData.map(m => m.culture))].length;
    document.getElementById('languages-count').textContent = [...new Set(manuscriptsData.map(m => m.language))].length;
    // document.getElementById('years-count').textContent = Math.max(...manuscriptsData.map(m => parseInt(m.year))) - Math.min(...manuscriptsData.map(m => parseInt(m.year)));

    displayManuscripts(manuscriptsData);
}

function displayManuscripts(list) {
    const gallery = document.getElementById('gallery');
    gallery.innerHTML = "";
    list.forEach(m => {
        const card = document.createElement('div');
        card.classList.add('card');
        card.innerHTML = `
            <img src="${m.image}" alt="${m.title}">
            <div class="card-content">
                <h3>${m.title}</h3>
                <p>${m.culture} - ${m.date}</p>
                <p class="source">Source: ${m.source}</p>
            </div>
        `;
        gallery.appendChild(card);
    });
}

// Filter buttons
document.querySelectorAll('.filters button').forEach(btn => {
    btn.addEventListener('click', () => {
        document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        const filter = btn.dataset.filter;
        if (filter === "all") {
            displayManuscripts(manuscriptsData);
        } else {
            displayManuscripts(manuscriptsData.filter(m => m.culture === filter));
        }
    });
});

fetchManuscripts();
let username = localStorage.getItem("username");

if(username){
document.getElementById("nav-user-name").textContent = username;
document.getElementById("profile-nav-item").style.display = "block";
}
</script>

</body>
</html>
