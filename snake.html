<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manuscript Snake Hunt</title>
    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #8B4513, #D2B48C, #DEB887);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Arial, sans-serif;
        }
        #gameContainer {
            width: 90vw;
            height: 90vh;
            position: relative;
            max-width: 1200px;
            max-height: 900px;
        }
        canvas {
            width: 100%;
            height: 100%;
            border: 6px solid #8B7355;
            border-radius: 18px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.8);
            background: #F4E4BC;
            display: block;
        }
        #hud {
            position: absolute;
            top: 15px;
            left: 15px;
            color: #FFD700;
            font-size: 2.2rem;
            font-weight: bold;
            text-shadow: 4px 4px 8px black;
            z-index: 10;
            pointer-events: none;
        }
        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.88);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
        }
        .big-btn {
            padding: 20px 60px;
            font-size: 2.2rem;
            background: #FFD700;
            color: #8B4513;
            border: none;
            border-radius: 12px;
            margin: 20px;
            cursor: pointer;
            font-weight: bold;
            min-width: 260px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }
        .small-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 12px 24px;
            font-size: 1.4rem;
            background: #FF4500;
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="hud">Score: 0 / 8   Time: 0:00</div>

        <!-- Start -->
        <div id="startScreen" class="overlay">
            <h1 style="font-size:5rem; color:#FFD700; margin-bottom:40px;">🐍 Manuscript Snake Hunt</h1>
            <p style="font-size:1.8rem; margin-bottom:40px;">Collect 8 treasures — avoid the poisons!</p>
            <button class="big-btn" onclick="startGame()">PLAY</button>
            <button class="small-btn" onclick="history.back()">← Back</button>
        </div>

        <!-- Game Over -->
        <div id="gameOverScreen" class="overlay" style="display:none;">
            <h2 style="color:#FF0000; font-size:5.5rem;">GAME OVER</h2>
            <p id="gameOverMsg" style="font-size:2rem; margin:40px 0;">You ate a poison!</p>
            <button class="big-btn" onclick="restartGame()">Try Again</button>
            <button class="big-btn" onclick="history.back()">Back to Site</button>
        </div>

        <!-- Win -->
        <div id="winScreen" class="overlay" style="display:none;">
            <h1 style="color:#FFD700; font-size:6rem;">WIN!</h1>
            <p id="finalTime" style="font-size:2.5rem; margin:30px 0; font-weight:bold; color:#FFD700; text-shadow: 2px 2px 4px black;">Time: 0:00</p>
            <p style="font-size:2rem; margin:30px 0;">You have collected all of the things we had learned during our FLL training sessions!</p>
            <button class="big-btn" onclick="restartGame()">Play Again</button>
            <button class="big-btn" onclick="history.back()">Back to Site</button>
        </div>
    </div>

    <script>
        const container = document.getElementById('gameContainer');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const hud = document.getElementById('hud');
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const winScreen = document.getElementById('winScreen');
        const gameOverMsg = document.getElementById('gameOverMsg');
        const finalTimeEl = document.getElementById('finalTime');

        function resizeCanvas() {
            const size = Math.min(container.clientWidth, container.clientHeight);
            canvas.width = size;
            canvas.height = size * 0.75;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        const COLS = 20;
        const ROWS = 15;
        const GOAL_SCORE = 8;

        let snake = [];
        let direction = { x: 1, y: 0 };
        let pendingDirection = { x: 1, y: 0 };
        let score = 0;
        let currentLevel = 1;
        let food = null;
        let poison = null;
        let gameRunning = false;
        let gameStartTime = 0;
        let gameInterval = null;

        // Images
        const snakeHeadImage = new Image();
        snakeHeadImage.src = 'images/snake_head.png';
        snakeHeadImage.onerror = () => console.log('Failed to load: images/snake_head.png');

        const snakeBodyImage = new Image();
        snakeBodyImage.src = 'images/snake_body.png';
        snakeBodyImage.onerror = () => console.log('Failed to load: images/snake_body.png');

        const foodImages = [
            'images/lego.jpg',
            'images/legomindstorm.jpg',
            'images/pid.jpg',
            'images/python.jpg',
            'images/cd.jpg',
            'images/vexlogo.jpg',
            'images/arduinoo.jpg',
            'images/css.jpg'
        ].map(src => {
            const img = new Image();
            img.src = src;
            img.onerror = () => console.log('Failed to load:', src);
            return img;
        });

        const poisonImage = new Image();
        poisonImage.src = 'images/poison.jpg'; 
        poisonImage.onerror = () => console.log('Failed to load: images/poison.jpg');

        document.addEventListener('keydown', e => {
            if (!gameRunning) return;
            e.preventDefault();
            const key = e.key.toLowerCase();

            if ((key === 'arrowup' || key === 'w') && direction.y === 0) {
                pendingDirection = { x: 0, y: -1 };
            } else if ((key === 'arrowdown' || key === 's') && direction.y === 0) {
                pendingDirection = { x: 0, y: 1 };
            } else if ((key === 'arrowleft' || key === 'a') && direction.x === 0) {
                pendingDirection = { x: -1, y: 0 };
            } else if ((key === 'arrowright' || key === 'd') && direction.x === 0) {
                pendingDirection = { x: 1, y: 0 };
            }
        });

        // Touch support
        let touchStartX = 0, touchStartY = 0;
        canvas.addEventListener('touchstart', e => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        });
        canvas.addEventListener('touchmove', e => {
            if (!gameRunning) return;
            e.preventDefault();
            const dx = e.touches[0].clientX - touchStartX;
            const dy = e.touches[0].clientY - touchStartY;
            if (Math.abs(dx) > Math.abs(dy)) {
                if (dx > 50 && direction.x === 0) pendingDirection = { x: 1, y: 0 };
                else if (dx < -50 && direction.x === 0) pendingDirection = { x: -1, y: 0 };
            } else {
                if (dy > 50 && direction.y === 0) pendingDirection = { x: 0, y: 1 };
                else if (dy < -50 && direction.y === 0) pendingDirection = { x: 0, y: -1 };
            }
        });

        function getRandomPosition(avoids = []) {
            let x, y;
            do {
                x = Math.floor(Math.random() * COLS);
                y = Math.floor(Math.random() * ROWS);
            } while (avoids.some(p => p.x === x && p.y === y));
            return { x, y };
        }

        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }

        function getElapsedTime() {
            return gameStartTime ? Math.floor((Date.now() - gameStartTime) / 1000) : 0;
        }

        function updateHUD() {
            const elapsed = getElapsedTime();
            hud.textContent = `Score: ${score} / ${GOAL_SCORE}   Time: ${formatTime(elapsed)}`;
        }

        function startGame() {
            startScreen.style.display = 'none';
            gameRunning = true;
            initGame();
            startGameLoop();
        }

        function initGame() {
            const centerX = Math.floor(COLS / 2);
            const centerY = Math.floor(ROWS / 2);
            snake = [{ x: centerX, y: centerY }];
            direction = { x: 1, y: 0 };
            pendingDirection = { x: 1, y: 0 };
            score = 0;
            currentLevel = 1;
            gameStartTime = Date.now();
            updateHUD();
            spawnFood();
            spawnPoison();
        }

        function spawnFood() {
            food = getRandomPosition(snake);
            food.level = score + 1; // 1 to 8
        }

        function spawnPoison() {
            const avoids = [...snake];
            if (food) avoids.push(food);
            poison = getRandomPosition(avoids);
            poison.level = score + 1;
        }

        // Move one cell at a time with 500ms delay (faster)
        const MOVE_DELAY = 500;

        function startGameLoop() {
            // Clear any existing interval
            if (gameInterval) {
                clearInterval(gameInterval);
            }
            
            // Draw initial state
            draw();
            
            // Start moving snake every 750ms
            gameInterval = setInterval(() => {
                if (!gameRunning) {
                    clearInterval(gameInterval);
                    return;
                }
                gameLoop();
            }, MOVE_DELAY);
        }

        function gameLoop() {
            if (!gameRunning) return;

            updateHUD();

            // Apply new direction only at the moment of moving
            direction = { ...pendingDirection };

            const head = {
                x: snake[0].x + direction.x,
                y: snake[0].y + direction.y
            };

            if (head.x < 0 || head.x >= COLS || head.y < 0 || head.y >= ROWS ||
                snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver('crash');
                return;
            }

            snake.unshift(head);

            let ateFood = false;
            if (food && head.x === food.x && head.y === food.y) {
                ateFood = true;
                score++;
                currentLevel++;
                if (score >= GOAL_SCORE) {
                    win();
                    return;
                }
                spawnFood();
                spawnPoison();
            }

            if (!ateFood) {
                snake.pop();
            }

            if (poison && head.x === poison.x && head.y === poison.y) {
                gameOver('poison');
                return;
            }

            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const cellW = canvas.width / COLS;
            const cellH = canvas.height / ROWS;
            const itemSize = Math.min(cellW, cellH) * 0.9;
            const snakeSize = itemSize;

            ctx.strokeStyle = 'rgba(139,69,19,0.15)';
            for (let i = 0; i <= COLS; i++) {
                ctx.beginPath();
                ctx.moveTo(i * cellW, 0);
                ctx.lineTo(i * cellW, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= ROWS; i++) {
                ctx.beginPath();
                ctx.moveTo(0, i * cellH);
                ctx.lineTo(canvas.width, i * cellH);
                ctx.stroke();
            }

            snake.forEach((seg, i) => {
                const sx = seg.x * cellW + (cellW - snakeSize) / 2;
                const sy = seg.y * cellH + (cellH - snakeSize) / 2;
                if (i === 0) {
                    if (snakeHeadImage.complete && snakeHeadImage.naturalHeight !== 0) {
                        ctx.drawImage(snakeHeadImage, sx, sy, snakeSize, snakeSize);
                    } else {
                        // Green snake head with eyes
                        ctx.fillStyle = '#006400';
                        ctx.fillRect(sx, sy, snakeSize, snakeSize);
                        ctx.fillStyle = '#FFFF00';
                        const eyeSize = snakeSize * 0.15;
                        ctx.fillRect(sx + snakeSize * 0.25, sy + snakeSize * 0.3, eyeSize, eyeSize);
                        ctx.fillRect(sx + snakeSize * 0.6, sy + snakeSize * 0.3, eyeSize, eyeSize);
                    }
                } else {
                    if (snakeBodyImage.complete && snakeBodyImage.naturalHeight !== 0) {
                        ctx.drawImage(snakeBodyImage, sx, sy, snakeSize, snakeSize);
                    } else {
                        ctx.fillStyle = '#228B22';
                        ctx.fillRect(sx, sy, snakeSize, snakeSize);
                        ctx.strokeStyle = '#006400';
                        ctx.lineWidth = 2;
                        ctx.strokeRect(sx, sy, snakeSize, snakeSize);
                    }
                }
            });

            if (food) {
                const fx = food.x * cellW + (cellW - itemSize) / 2;
                const fy = food.y * cellH + (cellH - itemSize) / 2;
                const idx = (food.level - 1) % foodImages.length;
                const img = foodImages[idx];
                if (img.complete && img.naturalHeight !== 0) {
                    ctx.drawImage(img, fx, fy, itemSize, itemSize);
                } else {
                    // Gold treasure with sparkle
                    const gradient = ctx.createRadialGradient(
                        fx + itemSize/2, fy + itemSize/2, 0,
                        fx + itemSize/2, fy + itemSize/2, itemSize/2
                    );
                    gradient.addColorStop(0, '#FFD700');
                    gradient.addColorStop(1, '#B8860B');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(fx, fy, itemSize, itemSize);
                    ctx.strokeStyle = '#8B7355';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(fx, fy, itemSize, itemSize);
                    // Star sparkle
                    ctx.fillStyle = '#FFF';
                    ctx.font = `${itemSize * 0.6}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('⭐', fx + itemSize/2, fy + itemSize/2);
                }
            }

            if (poison) {
                const px = poison.x * cellW + (cellW - itemSize) / 2;
                const py = poison.y * cellH + (cellH - itemSize) / 2;
                if (poisonImage.complete && poisonImage.naturalHeight !== 0) {
                    ctx.drawImage(poisonImage, px, py, itemSize, itemSize);
                } else {
                    // Red poison with skull
                    const gradient = ctx.createRadialGradient(
                        px + itemSize/2, py + itemSize/2, 0,
                        px + itemSize/2, py + itemSize/2, itemSize/2
                    );
                    gradient.addColorStop(0, '#FF4500');
                    gradient.addColorStop(1, '#8B0000');
                    ctx.fillStyle = gradient;
                    ctx.fillRect(px, py, itemSize, itemSize);
                    ctx.strokeStyle = '#000';
                    ctx.lineWidth = 3;
                    ctx.strokeRect(px, py, itemSize, itemSize);
                    // Skull emoji
                    ctx.font = `${itemSize * 0.7}px Arial`;
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('☠️', px + itemSize/2, py + itemSize/2);
                }
            }
        }

        function gameOver(reason) {
            gameRunning = false;
            if (gameInterval) {
                clearInterval(gameInterval);
            }
            gameOverMsg.textContent = reason === 'poison' ? 'You ate a poison!' : 'You lost!';
            gameOverScreen.style.display = 'flex';
        }

        function win() {
            gameRunning = false;
            if (gameInterval) {
                clearInterval(gameInterval);
            }
            finalTime = getElapsedTime();
            finalTimeEl.textContent = `Time: ${formatTime(finalTime)}`;
            winScreen.style.display = 'flex';
        }

        function restartGame() {
            gameOverScreen.style.display = 'none';
            winScreen.style.display = 'none';
            finalTimeEl.textContent = 'Time: 0:00';
            initGame();
            gameRunning = true;
            startGameLoop();
        }
    </script>
</body>
</html>
